<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Fedrick Region">
  <rect width="32" height="32" rx="7" fill="#0B111D"/>
  <defs>
    <linearGradient id="fr-gradient" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Growth accent (matches site gradient motif) -->
  <path
    d="M9 11.5 16 6.5 23 11.5"
    stroke="url(#fr-gradient)"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="23" cy="8.5" r="1.35" fill="#22D3EE"/>
  <text
    x="16"
    y="24.5"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="12.5"
    font-weight="800"
    letter-spacing="-0.5"
  >
    <tspan fill="#FFFFFF">F</tspan><tspan fill="url(#fr-gradient)">R</tspan>
  </text>
